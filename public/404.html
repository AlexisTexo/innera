<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Oops | Pagina no encontrada</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Avenir Next", "Segoe UI", "Helvetica Neue", Arial, sans-serif;
        color: #f5f5f5;
        background: #000;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .page {
        min-height: 100vh;
        position: relative;
        overflow: hidden;
      }

      .container {
        width: min(1120px, calc(100% - 3rem));
        margin: 0 auto;
      }

      .header {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 20;
        background: rgba(0, 0, 0, 0.9);
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
      }

      .header-inner {
        min-height: 78px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
      }

      .logo {
        height: 44px;
        width: auto;
      }

      .nav-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 999px;
        padding: 0.6rem 1rem;
        background: rgba(255, 255, 255, 0.11);
        font-size: 0.7rem;
        letter-spacing: 0.24em;
        text-transform: uppercase;
        font-weight: 700;
      }

      .main {
        padding-top: 7rem;
        padding-bottom: 4rem;
      }

      .hero {
        min-height: calc(100vh - 8rem);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        position: relative;
        z-index: 1;
      }

      h1 {
        margin: 1.5rem 0 0;
        font-size: clamp(2.25rem, 8.5vw, 5.2rem);
        line-height: 1.02;
        letter-spacing: -0.02em;
        font-weight: 700;
      }

      .accent {
        display: inline-block;
        font-style: italic;
        font-weight: 700;
        background-image: linear-gradient(
          90deg,
          #feb360,
          #ff8752,
          #fd573f,
          #52df83,
          #01b3bd,
          #2e73ff,
          #6851c5,
          #a36bda
        );
        background-size: 400% 400%;
        background-clip: text;
        -webkit-background-clip: text;
        color: transparent;
        animation: gradientShift 9s ease-in-out infinite;
      }

      p {
        margin: 1.5rem auto 0;
        max-width: 680px;
        font-size: clamp(1rem, 2.8vw, 1.15rem);
        line-height: 1.8;
        opacity: 0.76;
      }

      .cta {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        margin-top: 2rem;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.35);
        padding: 1.15rem 2.4rem;
        text-transform: uppercase;
        letter-spacing: 0.2em;
        font-weight: 700;
        font-size: 0.88rem;
      }

      .palette {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 0.75rem;
        margin-top: 2rem;
      }

      .bar {
        width: clamp(42px, 8vw, 68px);
        height: 8px;
        border-radius: 999px;
        animation: paletteFloat 3.2s ease-in-out infinite;
      }

      .bar:nth-child(1) {
        background: #feb360;
        animation-delay: 0s;
      }

      .bar:nth-child(2) {
        background: #ff8752;
        animation-delay: 0.16s;
      }

      .bar:nth-child(3) {
        background: #fd573f;
        animation-delay: 0.32s;
      }

      .bar:nth-child(4) {
        background: #a36bda;
        animation-delay: 0.48s;
      }

      .bar:nth-child(5) {
        background: #2e73ff;
        animation-delay: 0.64s;
      }

      .bar:nth-child(6) {
        background: #01b3bd;
        animation-delay: 0.8s;
      }

      .line {
        margin-top: 3.5rem;
        width: 1px;
        height: 3.4rem;
        background: rgba(255, 255, 255, 0.45);
      }

      @keyframes gradientShift {
        0% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
        100% {
          background-position: 0% 50%;
        }
      }

      @keyframes paletteFloat {
        0%,
        100% {
          transform: translateY(0);
          opacity: 0.75;
        }
        50% {
          transform: translateY(-6px);
          opacity: 1;
        }
      }

      @media (max-width: 560px) {
        .container {
          width: min(1120px, calc(100% - 2rem));
        }

        .nav-link {
          display: none;
        }

        .palette {
          gap: 0.55rem;
        }

        .cta {
          width: 100%;
          padding-inline: 1.5rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <header class="header">
        <div class="container header-inner">
          <img src="/logo_innera_text.png" alt="Innera" class="logo" />
          <a href="/innera" class="nav-link">Inicio</a>
        </div>
      </header>

      <main class="container main">
        <section class="hero">
          <h1>
            <span class="accent">Oops.</span>
            <br />
            <span>Pagina no encontrada.</span>
          </h1>
          <p>La pagina que buscas no existe o fue movida. Regresa al inicio y vuelve a entrar desde ahi.</p>
          <a href="/innera" class="cta">Regresar al inicio</a>
          <div class="palette" aria-hidden="true">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
          </div>
          <span class="line" aria-hidden="true"></span>
        </section>
      </main>
    </div>
  </body>
</html>
